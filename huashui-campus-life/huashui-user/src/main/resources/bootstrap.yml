server:
  port: 8082
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  application:
    name: huashui-user
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-mybatis.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
          - data-id: shared-feign.yaml
            refresh: false
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/huashui?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

hs:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.huashui.user.controller
    title: 华水校园生活 - 用户中心接口文档
    description: 该服务包含用户管理、角色权限功能
    contact-name: 华北水利水电大学.信息工程学院
    version: v1.0
  jdbc:
    database: huashui_campus_life
  auth:
    resource:
      enable: true
