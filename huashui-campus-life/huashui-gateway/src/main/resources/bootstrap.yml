server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: huashui-gateway
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-redis.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
          - data-id: shared-gateway.yaml
            refresh: false
    gateway:
      routes:
        - id: huashui-auth
          uri: lb://huashui-auth
          predicates:
            - Path=/auth/**
        - id: huashui-user
          uri: lb://huashui-user
          predicates:
            - Path=/user/**
        - id: huashui-dormitory
          uri: lb://huashui-dormitory
          predicates:
            - Path=/dormitory/**
        - id: huashui-utility
          uri: lb://huashui-utility
          predicates:
            - Path=/utility/**
        - id: huashui-attendance
          uri: lb://huashui-attendance
          predicates:
            - Path=/attendance/**
        - id: huashui-file
          uri: lb://huashui-file
          predicates:
            - Path=/file/**
        - id: huashui-system
          uri: lb://huashui-system
          predicates:
            - Path=/system/**

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

hs:
  swagger:
    enable: false
  auth:
    resource:
      enable: true

logging:
  level:
    com.huashui.gateway: debug
