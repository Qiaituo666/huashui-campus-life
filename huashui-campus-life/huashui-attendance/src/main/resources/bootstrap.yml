server:
  port: 8090  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: huashui-attendance
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
          - data-id: shared-feign.yaml # 共享feign配置
            refresh: false
          - data-id: shared-mq.yaml # 共享mq配置
            refresh: false
hs:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.huashui.attendance.controller
    title: 华水校园生活 - 考勤中心接口文档
    description: 该服务包含用户的考勤模块：签到、排班、工作记录功能
    contact-name: 华北水利水电大学.信息工程学院
    version: v1.0
  jdbc:
    database: huashui_campus_life
  auth:
    resource:
      enable: true
