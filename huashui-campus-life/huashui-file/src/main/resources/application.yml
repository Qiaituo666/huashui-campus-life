server:
  port: 8088

spring:
  application:
    name: huashui-file
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: huashui
