server:
  port: 8088
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  application:
    name: huashui-file
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
          - data-id: shared-minio.yaml
            refresh: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# =====================================================================
# MinIO 对象存储 — 本地兜底配置
# =====================================================================
# 说明：真正的环境配置在 Nacos 的 shared-minio.yaml 中管理；
# 这里的值仅作为 Nacos 不可用时的兜底，方便本地开发和调试。
# Nacos 可用时，远端配置会自动覆盖本地值。
# =====================================================================
minio:
  endpoint: http://127.0.0.1:9000
  access-key: huashui
  secret-key: huashui123456
  bucket: huashui

hs:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.huashui.file.controller
    title: 华水校园生活 - 文件服务接口文档
    description: 该服务包含文件上传、下载功能
    contact-name: 华北水利水电大学.信息工程学院
    version: v1.0
  auth:
    resource:
      enable: true
