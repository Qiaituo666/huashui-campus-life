server:
  port: 8088
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  application:
    name: huashui-file
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: huashui

hs:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.huashui.file.controller
    title: 华水校园生活 - 文件服务接口文档
    description: 该服务包含文件上传、下载功能
    contact-name: 华北水利水电大学.信息工程学院
    version: v1.0
  auth:
    resource:
      enable: true
